                      - heading "October 21, 2020 9:00 AM (Council Orientation Worksession Part One)" [level=3] [ref=e2802]
                      - generic [ref=e2803]: Limited public attendance at Mayor and Council and Board and Commission Meetings will be permitted based on Governor Hogan’s most recent Executive Order. These guidelines allow up to 75 percent capacity for indoor venues, with appropriate social distancing and face coverings for all attendees.
                      - generic [ref=e2804]: "For this meeting, the Town of Berlin will implement these guidelines as follows:"
                      - generic [ref=e2805]: 1. All attendees will practice social distancing and will wear face coverings.
                      - generic [ref=e2806]: 2. Seating will be first-come, first-served.
                      - generic [ref=e2807]: 3. As this meeting is occurring during regular business hours, all entry will be through the main lobby located at the parking lot entrance.
